name: CI

# Führt die v0.4-Testsuite (13 Prüfungen) bei jedem Push und Pull Request aus:
#   Teil 1 Verdikt-Parität A–G · Teil 2 gewichtete Valenz (Schicht B) · Teil 3 Invarianten.
# Schlägt der Testlauf fehl, blockiert das den Merge / die spätere Veröffentlichung
# (maschinelle Entsprechung der "monotonen Verschärfung": nichts Gebrochenes geht raus).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ '18', '20', '22' ]
    defaults:
      run:
        working-directory: packages/ethikeskin-ajv
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Ajv (peer dependency) installieren
        run: npm install ajv@^8 --no-save
      - name: v0.4-Testsuite prüfen
        run: npm test
